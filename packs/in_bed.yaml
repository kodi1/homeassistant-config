homeassistant:
  customize:
    automation.in_bed:
      icon: mdi:bed-king
    automation.in_bed_clear:
      icon: mdi:bed-king-outline
    automation.in_bed_light:
      icon: mdi:lightbulb-on-outline

automation:
  - alias: in_bed
    id: in_bed
    triggers:
      - trigger: state
        entity_id: binary_sensor.bed_in
        to: 'on'
        id: trigger_on
      - trigger: state
        entity_id: binary_sensor.hall_motion
        to: 'on'
        id: trigger_off
      - trigger: state
        entity_id: device_tracker.n0ll
        to: home
        id: trigger_off
      - trigger: event
        event_type: android_alarm
        id: trigger_off
    mode: restart
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: trigger_on
              - condition: state
                entity_id: input_boolean.in_bed_dummy_switch
                state: 'off'
              - condition: state
                entity_id: device_tracker.root
                state: home
              - condition: template
                value_template: >-
                  {{ not is_state('media_player.livingtv', 'playing') }}
              - condition: state
                entity_id: device_tracker.n0ll
                state: not_home
              - condition: time
                after: '23:00:00'
                before: '07:00:00'
            sequence:
              - action: script.light_extend_clear
              - wait_template: >-
                  {{
                      is_state('timer.lumi_double_switch_1_timer', 'idle')
                    }}
                timeout:
                  seconds: 30
                continue_on_timeout: true
              - action: input_boolean.turn_on
                data:
                  entity_id: input_boolean.in_bed_dummy_switch
              - action: automation.turn_off
                data:
                  entity_id: automation.bed_light
              - delay:
                  seconds: 3
              - action: timer.start
                entity_id: timer.dummy_in_bed
                data:
                  duration: '00:00:45'

          - conditions:
              - condition: trigger
                id: trigger_off
              - condition: state
                entity_id: input_boolean.in_bed_dummy_switch
                state: 'on'
              - condition: state
                entity_id: device_tracker.root
                state: home
            sequence:
              - action: input_boolean.turn_off
                data:
                  entity_id: input_boolean.in_bed_dummy_switch
              - action: automation.turn_on
                data:
                  entity_id: automation.bed_light

  - alias: in_bed_light
    id: in_bed_light
    triggers:
      - trigger: event
        event_type:
          - timer.finished
          - timer.restarted
          - timer.started
        event_data:
          entity_id: timer.dummy_in_bed
    conditions:
      - condition: and
        conditions:
          - condition: template
            value_template: >-
              {{
                  is_state('binary_sensor.day', 'off') or
                    is_state('light.bed', 'on')
                }}
    actions:
      - variables:
          brightness_pct: >-
            {%- if is_state('binary_sensor.night_mode', 'off') -%}
              {{ range(85, 95, 2) | random }}
            {%- else -%}
              {{ range(1, 10, 2) | random }}
            {%- endif -%}
          color_temp: >-
            {%- if is_state('binary_sensor.night_mode', 'off') -%}
              {{ range(250, 350, 10) | random }}
            {%- else -%}
              {{ range(350, 450, 10) | random }}
            {%- endif -%}
          transition: >-
            {%- if is_state('binary_sensor.night_mode', 'off') -%}
              5
            {%- else -%}
              1
            {%- endif -%}
      - action: script.turn_on
        data:
          entity_id: >-
            {%-
                set scr = {
                  'timer.finished': 'script.bed_light_off',
                  'timer.started': 'script.bed_light_on',
                  'timer.restarted': 'script.bed_light_on'
                }
              -%}
            {{ scr[trigger.event.event_type] }}
          variables:
            target_light: >-
                light.bed
            brightness_pct: >-
              {{ brightness_pct }}
            transition: >-
              {{ transition }}
            color_temp: >-
              {{ color_temp }}

input_boolean:
  in_bed_dummy_switch:
    name: bed
    icon: mdi:toggle-switch
    initial: off

timer:
  dummy_in_bed:
    name: sleep
    icon: mdi:clock
    duration: '00:03:00'
