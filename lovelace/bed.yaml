title: bed
icon: mdi:bed
path: bed

cards:
  - type: entities
    show_header_toggle: false
    entities:
      - light.bed
      - type: divider
      - entity: cover.bed
        secondary_info: tilt-position

  - type: vertical-stack
    cards:
      - type: conditional
        conditions:
          - entity: media_player.bedroom_speaker
            state_not: 'unavailable'
        card:
          type: media-control
          entity: media_player.bedroom_speaker

      - type: conditional
        conditions:
          - entity: media_player.bedroom_speaker
            state_not: 'unavailable'
        card:
          type: entities
          show_header_toggle: false
          entities:
            - input_select.select_radio_bed
            - input_number.bed_music_timer
            - timer.bed_music

      - type: conditional
        conditions:
          - entity: media_player.bedroom_speaker
            state_not: 'unavailable'
        card:
          type: entities
          show_header_toggle: false
          entities:
            - input_number.post_android_alarm
            - timer.post_android_alarm

  - type: entities
    show_header_toggle: false
    state_color: true
    entities:
      - binary_sensor.bedroom
      - binary_sensor.bedmusic

  - type: entities
    show_header_toggle: false
    state_color: true
    entities:
      - binary_sensor.bed_in
      - automation.in_bed
      - automation.bed_light
      - automation.night_light_switch
      - automation.in_bed_light
      - timer.dummy_in_bed
      - type: divider
      - automation.bed_sleep_on
      - automation.bed_sleep_on_spot
      - type: divider
      - input_boolean.in_bed_dummy_switch
