homeassistant:
  customize:
    fan.living_climate:
      icon: mdi:sofa-outline
    fan.bed_climate:
      icon: mdi:bed-king-outline
    fan.office_climate:
      icon: mdi:desk

# INN-FR-B32
modbus:
  - type: tcp
    host: gw_rs485
    port: 8899
    name: gw_rs485
    message_wait_milliseconds: 30
    climates:
      - name: temp_living
        data_type: uint16
        slave: 10
        address: 0
        max_temp: 28
        min_temp: 18
        offset: 0
        precision: 1
        scale: 0.1
        target_temp_register: 231
        temp_step: 0.5
        temperature_unit: °C
        scan_interval: 300

      - name: temp_bed
        data_type: uint16
        slave: 20
        address: 0
        max_temp: 28
        min_temp: 18
        offset: 0
        precision: 1
        scale: 0.1
        target_temp_register: 231
        temp_step: 0.5
        temperature_unit: °C
        scan_interval: 300

      - name: temp_office
        data_type: uint16
        slave: 30
        address: 0
        max_temp: 28
        min_temp: 18
        offset: 0
        precision: 1
        scale: 0.1
        target_temp_register: 231
        temp_step: 0.5
        temperature_unit: °C
        scan_interval: 300

    sensors:
      - name: water_living_climate
        slave: 10
        address: 1
        offset: 0
        precision: 1
        scale: 0.1
        unit_of_measurement: °C
        scan_interval: 300

      - name: state_living_climate
        slave: 10
        address: 201
        scan_interval: 300

      - name: state_bed_climate
        slave: 20
        address: 201
        scan_interval: 300

      - name: state_office_climate
        slave: 30
        address: 201
        scan_interval: 300

      - name: mains_voltage
        slave: 40
        address: 0
        input_type: input
        #count: 2
        precision: 1
        data_type: float32
        device_class: voltage
        unit_of_measurement: V
        scan_interval: 300

      - name: mains_power
        slave: 40
        address: 12
        input_type: input
        #count: 2
        precision: 1
        data_type: float32
        device_class: power
        unit_of_measurement: W
        scan_interval: 300

      - name: mains_freq
        slave: 40
        address: 70
        input_type: input
        #count: 2
        precision: 2
        data_type: float32
        device_class: frequency
        unit_of_measurement: Hz
        scan_interval: 300

      - name: mains_factor
        slave: 40
        address: 30
        input_type: input
        #count: 2
        precision: 2
        scale: 100
        data_type: float32
        device_class: power_factor
        unit_of_measurement: '%'
        scan_interval: 300

      - name: mains_energy
        slave: 40
        address: 342
        input_type: input
        #count: 2
        precision: 1
        data_type: float32
        device_class: energy
        unit_of_measurement: kW
        scan_interval: 300

script:
  climate_ctrl:
    mode: queued
    max: 10
    sequence:
      - service: homeassistant.update_entity
        data_template:
          entity_id: >-
            {{state_target}}
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 201
        data_template:
          unit: >-
            {{unit}}
          value: >-
            {%-
                set val = {
                              'on': states(state_target) | int(0) | bitwise_and(0xFF7F),
                              'off': states(state_target) | int(0) | bitwise_and(0xFF7F) | bitwise_or(0x80),
                              'auto': states(state_target) | int(0) | bitwise_and(0xFFF8),
                              'max': states(state_target) | int(0) | bitwise_and(0xFFF8) | bitwise_or(0b011),
                              'silent': states(state_target) | int(0) | bitwise_and(0xFFF8) | bitwise_or(0b001),
                              'night': states(state_target) | int(0) | bitwise_and(0xFFF8) | bitwise_or(0b010),

                            }
              -%}
            {{ val[ctrl] }}
      - delay:
          milliseconds: 250
      - service: homeassistant.update_entity
        data_template:
          entity_id: >-
            {{state_target}}

  climate_lock:
    sequence:
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 10
          value: 64

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 20
          value: 64

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 30
          value: 64

  climate_unlock:
    sequence:
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 10
          value: 0

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 20
          value: 0

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 247
          unit: 30
          value: 0

  climate_auto:
    alias: auto
    icon: mdi:weather-partly-snowy-rainy
    sequence:
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 10
          value: 0

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 20
          value: 0

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 30
          value: 0

  climate_cool:
    alias: cool
    icon: mdi:weather-snowy-rainy
    sequence:
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 10
          value: 5

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 20
          value: 5

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 30
          value: 5

  climate_heat:
    alias: heat
    icon: mdi:weather-sunny
    sequence:
      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 10
          value: 3

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 20
          value: 3

      - service: modbus.write_register
        data:
          hub: gw_rs485
          address: 233
          unit: 30
          value: 3

fan:
  - platform: template
    fans:
      living_climate:
        friendly_name: 'living'
        value_template: >-
          {%-
            set val = {
                          0x00: 'on',
                          0x80: 'off',
                        }
            -%}
          {{ val[states('sensor.state_living_climate') | int(0) | bitwise_and(0x80)] }}
        preset_mode_template: >-
          {%-
            set val = {
                          0b000: 'auto',
                          0b011: 'max',
                          0b010: 'night',
                          0b001: 'silent'
                        }
            -%}
          {{ val[states('sensor.state_living_climate') | int(0) | bitwise_and(0x7)]}}
        turn_on:
          service: script.climate_ctrl
          data:
            ctrl: 'on'
            state_target: 'sensor.state_living_climate'
            unit: 10
        turn_off:
          service: script.climate_ctrl
          data:
            ctrl: 'off'
            state_target: 'sensor.state_living_climate'
            unit: 10
        set_preset_mode:
          service: script.climate_ctrl
          data:
            ctrl: >-
              {{ preset_mode }}
            state_target: 'sensor.state_living_climate'
            unit: 10
        preset_modes:
          - 'auto'
          - 'max'
          - 'night'
          - 'silent'

      bed_climate:
        friendly_name: 'bed'
        value_template: >-
          {%-
            set val = {
                          0x00: 'on',
                          0x80: 'off',
                        }
            -%}
          {{ val[states('sensor.state_bed_climate') | int(0) | bitwise_and(0x80)] }}
        preset_mode_template: >-
          {%-
            set val = {
                          0b000: 'auto',
                          0b011: 'max',
                          0b010: 'night',
                          0b001: 'silent'
                        }
            -%}
          {{ val[states('sensor.state_bed_climate') | int(0) | bitwise_and(0x7)] }}
        turn_on:
          service: script.climate_ctrl
          data:
            ctrl: 'on'
            state_target: 'sensor.state_bed_climate'
            unit: 20
        turn_off:
          service: script.climate_ctrl
          data:
            ctrl: 'off'
            state_target: 'sensor.state_bed_climate'
            unit: 20
        set_preset_mode:
          service: script.climate_ctrl
          data:
            ctrl: >-
              {{ preset_mode }}
            state_target: 'sensor.state_bed_climate'
            unit: 20
        preset_modes:
          - 'auto'
          - 'max'
          - 'night'
          - 'silent'

      office_climate:
        friendly_name: 'office'
        value_template: >-
          {%-
            set val = {
                          0x00: 'on',
                          0x80: 'off',
                        }
            -%}
          {{ val[states('sensor.state_office_climate') | int(0) | bitwise_and(0x80)] }}
        preset_mode_template: >-
          {%-
            set val = {
                          0b000: 'auto',
                          0b011: 'max',
                          0b010: 'night',
                          0b001: 'silent'
                        }
            -%}
          {{ val[states('sensor.state_office_climate') | int(0) | bitwise_and(0x7)] }}
        turn_on:
          service: script.climate_ctrl
          data:
            ctrl: 'on'
            state_target: 'sensor.state_office_climate'
            unit: 30
        turn_off:
          service: script.climate_ctrl
          data:
            ctrl: 'off'
            state_target: 'sensor.state_office_climate'
            unit: 30
        set_preset_mode:
          service: script.climate_ctrl
          data:
            ctrl: >-
              {{ preset_mode }}
            state_target: 'sensor.state_office_climate'
            unit: 30
        preset_modes:
          - 'auto'
          - 'max'
          - 'night'
          - 'silent'
