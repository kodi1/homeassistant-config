homeassistant:
  customize:
    light.living:
      icon: mdi:track-light
    automation.living_light:
      friendly_name: living
      icon: mdi:lightbulb-auto
    automation.other_living_light:
      friendly_name: living
      icon: mdi:lightbulb-auto

automation:
  - alias: living_light
    id: living_light
    initial_state: false
    triggers:
      - trigger: state
        entity_id: binary_sensor.living_motion
        to: 'on'
        id: light_on
      - trigger: state
        entity_id: binary_sensor.living_occupancy
        to: 'off'
        for:
          seconds: 60
        id: light_off
      - trigger: state
        entity_id: binary_sensor.bed_motion
        to: 'on'
        id: light_off
      - trigger: state
        entity_id: binary_sensor.office_motion
        to: 'on'
        id: light_off
      - trigger: state
        entity_id: binary_sensor.light_video_pause
        to: 'on'
        id: light_on
      - trigger: state
        entity_id: binary_sensor.light_video_pause
        to: 'off'
        id: light_off_video
      - trigger: event
        event_type: lights_check
        event_data:
          light: turn_off
        id: light_off

    mode: restart
    actions:
      - variables:
          brightness_pct: >-
            {%- if is_state('binary_sensor.night_mode', 'off') and
              is_state('binary_sensor.light_video_pause', 'off') -%}
              {{ range(85, 95, 2) | random }}
            {%- else -%}
              {{ range(1, 10, 2) | random }}
            {%- endif -%}
          color_temp: >-
            {%- if is_state('binary_sensor.night_mode', 'off') and
              is_state('binary_sensor.light_video_pause', 'off') -%}
              {{ range(250, 350, 10) | random }}
            {%- else -%}
              {{ range(350, 450, 10) | random }}
            {%- endif -%}
          transition: >-
            {%- if is_state('binary_sensor.night_mode', 'off') -%}
              5
            {%- else -%}
              1
            {%- endif -%}
      - choose:
        - conditions:
          - condition: trigger
            id: light_on
          - condition: state
            entity_id: light.living
            state: 'off'
          - condition: state
            entity_id: binary_sensor.kodi_active
            state: 'off'
          - condition: state
            entity_id: binary_sensor.day
            state: 'off'
          - condition: numeric_state
            entity_id: sensor.living_lux
            value_template: >-
              {{ float(state.state, 30) }}
            below: 40
          sequence:
            - action: script.living_light_on
              data:
                brightness_pct: >-
                  {{ brightness_pct }}
                transition: >-
                  {{ transition }}
                color_temp: >-
                  {{ color_temp }}

        - conditions:
          - condition: trigger
            id: light_off
          - condition: state
            entity_id: light.living
            state: 'on'
          - condition: state
            entity_id: binary_sensor.light_video_pause
            state: 'off'
          - condition: or
            conditions:
              - condition: state
                entity_id: binary_sensor.living_occupancy
                state: 'off'
              - condition: state
                entity_id: binary_sensor.kodi_active
                state: 'on'
          sequence:
            - action: script.living_light_off
              data:
                transition: >-
                  {{ transition }}

        - conditions:
          - condition: trigger
            id: light_off_video
          - condition: state
            entity_id: light.living
            state: 'on'
          sequence:
            - action: script.living_light_off
              data:
                transition: >-
                  {{ transition }}

      - choose:
        - conditions:
          - condition: trigger
            id: light_on
          sequence:
            - event: kitchen_light_1
              event_data:
                ctrl: living_on
                brightness_pct: >-
                  {{ brightness_pct }}
                color_temp: >-
                  {%- if is_state('light.living', 'on') -%}
                    {{ state_attr('light.living', 'color_temp') }}
                  {%- else -%}
                    {{ color_temp }}
                  {%- endif -%}
                transition: >-
                  {{ transition }}

      - choose:
        - conditions:
          - condition: trigger
            id: light_off
          sequence:
            - event: kitchen_light_1
              event_data:
                ctrl: living_off
                transition: >-
                  {{ transition }}

  - alias: other_living_light
    id: other_living_light
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.living_motion
          - binary_sensor.night_mode_ctrl
        to: 'on'
        id: light_on
      - trigger: state
        entity_id: binary_sensor.living_occupancy
        to: 'off'
        for:
          seconds: 120
        id: light_off
      - trigger: state
        entity_id: binary_sensor.night_mode_ctrl
        to: 'off'
        id: light_ctrl_off
      - trigger: event
        event_type: lights_check
        event_data:
          light: turn_off
        id: light_ctrl_off

    mode: restart
    actions:
      - choose:
        - conditions:
          - condition: trigger
            id: light_on
          - condition: state
            entity_id: binary_sensor.living_occupancy
            state: 'on'
          - condition: state
            entity_id: binary_sensor.night_mode_ctrl
            state: 'on'
          - condition: state
            entity_id: light.shutter_living
            state: 'off'
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.shutter_living

        - conditions:
          - condition: trigger
            id: light_off
          - condition: state
            entity_id: binary_sensor.living_occupancy
            state: 'off'
          - condition: state
            entity_id: light.shutter_living
            state: 'on'
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.shutter_living

        - conditions:
          - condition: trigger
            id: light_ctrl_off
          - condition: state
            entity_id: light.shutter_living
            state: 'on'
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.shutter_living

script:
  living_light_off:
    sequence:
      - action: light.turn_off
        target:
          entity_id: >-
            {{
                expand(state_attr('light.living', 'entity_id')) |
                  selectattr('state', 'eq', 'on') |
                  map(attribute='entity_id') |
                  list
              }}
        data:
          transition: >-
            {{ transition }}

  living_light_ctrl:
    sequence:
      - action: light.turn_on
        target:
          entity_id: >-
            {{ target_light }}
        data:
          color_temp: >-
            {{ color_temp }}
          brightness_pct: 1
          transition: 0
      - delay:
          milliseconds: >-
            {{
                states('input_number.ctrl_delay') | int (100)
              }}
      - action: light.turn_on
        target:
          entity_id: >-
            {{ target_light }}
        data:
          brightness_pct: >-
            {{ brightness_pct }}
          transition: >-
            {{ transition }}

  living_light_on:
    mode: restart
    sequence:
      - variables:
          target_light: >-
            {%- set l_off = expand(state_attr('light.living', 'entity_id')) |
                    selectattr('state', 'eq', 'off') |
                    map(attribute='entity_id') |
                    list -%}
            {%- if is_state('binary_sensor.night_mode', 'off') -%}
              light.living
            {%- elif l_off -%}
              {{
                  l_off | random
                }}
            {%- else -%}
              {{
                  expand(state_attr('light.living', 'entity_id')) |
                    map(attribute='entity_id') |
                    list | random
                }}
            {%- endif -%}

      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.night_mode
            state: 'on'
          sequence:
            - action: script.living_light_off
              data:
                transition: 1

      - action: script.living_light_ctrl
        data:
          target_light: >-
            {{ target_light }}
          brightness_pct: >-
            {{ brightness_pct }}
          transition: >-
            {{ transition }}
          color_temp: >-
            {{ color_temp }}

light:
  - platform: group
    name: living
    entities:
      - light.living_1
      - light.living_2
      - light.living_3
      - light.living_4
      - light.living_5
      - light.living_6
      - light.living_7
